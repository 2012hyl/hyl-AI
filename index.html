<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>温柔陪伴 · 多模式</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif}
html,body{height:100%}
body{display:flex;align-items:center;justify-content:center;padding:8px;background:var(--bg-body);transition:background 0.2s}

:root {
  --bg-body: #fdfbfb;
  --bg-chat: #fff;
  --bg-header: #f9f3f5;
  --bg-user: #f97e97;
  --bg-ai: #f5f1f3;
  --bg-input: #f5f1f3;
  --btn: #f97e97;
  --btn-hover: #f86b87;
  --text-user: #fff;
  --text-ai: #555;
  --text-header: #6b5f63;
  --border-light: rgba(0,0,0,0.05);
  --tab-active: #f97e97;
  --tab-hover: #fde8ec;
  --card-bg: #fff;
  --card-border: #e0c8d0;
  --card-shadow: rgba(0,0,0,0.06);
}
.theme-pink{
  --bg-body: #fdfbfb; --bg-chat: #fff; --bg-header: #f9f3f5; --bg-user: #f97e97; --bg-ai: #f5f1f3;
  --bg-input: #f5f1f3; --btn: #f97e97; --btn-hover: #f86b87; --text-user: #fff; --text-ai: #555;
  --text-header: #6b5f63; --tab-active: #f97e97; --tab-hover: #fde8ec; --card-bg: #fff; --card-border: #e0c8d0;
}
.theme-blue{
  --bg-body: #f7f8fc; --bg-chat: #fff; --bg-header: #eef2fb; --bg-user: #6b8bdb; --bg-ai: #f1f5fb;
  --bg-input: #f1f5fb; --btn: #6b8bdb; --btn-hover: #5a7bcf; --text-user: #fff; --text-ai: #555;
  --text-header: #4a5a7a; --tab-active: #6b8bdb; --tab-hover: #e8eefb; --card-bg: #fff; --card-border: #c0d0e8;
}
.theme-purple{
  --bg-body: #fafaff; --bg-chat: #fff; --bg-header: #f3eefc; --bg-user: #9c73e6; --bg-ai: #f4f0fc;
  --bg-input: #f4f0fc; --btn: #9c73e6; --btn-hover: #8a61d4; --text-user: #fff; --text-ai: #555;
  --text-header: #5a4a7a; --tab-active: #9c73e6; --tab-hover: #f0eafc; --card-bg: #fff; --card-border: #d0c8e8;
}
.theme-green{
  --bg-body: #f9fffb; --bg-chat: #fff; --bg-header: #eefbf2; --bg-user: #52c9a1; --bg-ai: #f0faf5;
  --bg-input: #f0faf5; --btn: #52c9a1; --btn-hover: #42b891; --text-user: #fff; --text-ai: #555;
  --text-header: #3a6a5a; --tab-active: #52c9a1; --tab-hover: #e6f8f2; --card-bg: #fff; --card-border: #c0e0d0;
}
.theme-dark{
  --bg-body: #1a1a1d; --bg-chat: #252529; --bg-header: #2d2d33; --bg-user: #5a86f0; --bg-ai: #36363d;
  --bg-input: #36363d; --btn: #5a86f0; --btn-hover: #4a76e0; --text-user: #fff; --text-ai: #e0e0e0;
  --text-header: #d0d0d8; --tab-active: #5a86f0; --tab-hover: #2e3040; --card-bg: #2d2d33; --card-border: #4a4a5a; --border-light: rgba(255,255,255,0.08);
}
.theme-dark #msg-input::placeholder{color:#888}

.chat-wrapper{width:100%;max-width:420px;height:100dvh;display:flex;flex-direction:column}
.chat-box{width:100%;height:100%;background:var(--bg-chat);border-radius:28px;box-shadow:0 8px 30px rgba(0,0,0,0.08);display:flex;flex-direction:column;overflow:hidden}

.theme-bar{display:flex;gap:10px;padding:10px 16px;background:var(--bg-header);flex-wrap:wrap;align-items:center}
.theme-btn{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all 0.15s;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.theme-btn:hover{transform:scale(1.08);border-color:rgba(255,255,255,0.5)}
.theme-btn.active{border-color:#fff;box-shadow:0 0 0 2px var(--btn)}
.theme-pink-btn{background:#f97e97}
.theme-blue-btn{background:#6b8bdb}
.theme-purple-btn{background:#9c73e6}
.theme-green-btn{background:#52c9a1}
.theme-dark-btn{background:#2d2d33}
.clear-btn{background:transparent;color:var(--text-header);border:1px solid var(--text-header);padding:4px 12px;border-radius:12px;font-size:12px;cursor:pointer;margin-left:auto;opacity:0.7}
.clear-btn:hover{opacity:1}

.mode-bar{padding:8px 14px;background:var(--bg-header);border-top:1px solid var(--border-light)}
.mode-bar-label{font-size:10px;color:var(--text-header);opacity:0.5;margin-bottom:6px;text-align:center}
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mode-card{background:var(--bg-body);border:1px solid var(--border-light);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:all 0.15s;font-size:10px;color:var(--text-ai)}
.mode-card:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,0.06)}
.mode-card.active{border-color:var(--tab-active);background:var(--tab-active);color:#fff}
.mode-emoji{font-size:20px;display:block;margin-bottom:2px}

.chat-header{background:var(--bg-header);padding:8px 20px;text-align:center}
.chat-header h3{font-size:15px;color:var(--text-header);font-weight:500}

.chat-messages{flex:1;padding:18px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:var(--bg-body)}
.msg-user{align-self:flex-end;max-width:75%;padding:10px 14px;background:var(--bg-user);color:var(--text-user);border-radius:18px 18px 4px 18px;font-size:15px;line-height:1.45;word-break:break-word;animation:fadeIn 0.15s ease}
.msg-ai{align-self:flex-start;max-width:85%;padding:16px;background:var(--bg-ai);color:var(--text-ai);border-radius:18px 18px 18px 4px;font-size:14px;line-height:1.6;word-break:break-word;animation:fadeIn 0.15s ease;white-space:pre-line}
.msg-card{align-self:center;width:90%;max-width:340px;background:var(--card-bg);border:2px solid var(--card-border);border-radius:20px;padding:20px 16px;box-shadow:0 8px 24px var(--card-shadow);text-align:center;animation:fadeIn 0.3s ease}
.msg-card .card-number{font-size:13px;color:var(--text-ai);opacity:0.7;margin-bottom:6px}
.msg-card .card-name{font-size:26px;font-weight:700;color:var(--tab-active);margin-bottom:4px}
.msg-card .card-position{display:inline-block;background:var(--tab-active);color:#fff;padding:3px 14px;border-radius:12px;font-size:13px;margin-bottom:12px}
.msg-card .card-reading{font-size:14px;color:var(--text-ai);line-height:1.7;text-align:left;margin-bottom:14px}
.msg-card .card-gift{font-size:13px;color:var(--tab-active);font-style:italic}

@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

.chat-input-area{display:flex;padding:12px 14px;gap:10px;border-top:1px solid var(--border-light)}
#msg-input{flex:1;padding:12px 16px;border:none;border-radius:24px;background:var(--bg-input);font-size:15px;outline:none;color:var(--text-ai);transition:opacity 0.15s}
#msg-input:disabled{opacity:0.5}
#send-btn{padding:0 20px;height:44px;background:var(--btn);color:#fff;border:none;border-radius:22px;font-size:15px;font-weight:500;cursor:pointer;transition:all 0.15s}
#send-btn:hover{background:var(--btn-hover)}
#send-btn.stop-mode{background:#9a9a9a;opacity:0.9}

.visitor-count{text-align:center;padding:4px;font-size:10px;color:var(--text-header);opacity:0.5;background:var(--bg-header)}

.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--btn);opacity:0.3;border-radius:4px}
</style>
</head>

<body class="theme-pink">
<div class="chat-wrapper">
  <div class="chat-box">
    <div class="theme-bar">
      <button class="theme-btn theme-pink-btn" data-theme="theme-pink"></button>

  </div>
</div>

<script>
const API_KEY = "6bd5519c6ed0436dbba6667b2a7bbfbd.fYGRMgdTwPZ5SrEt";

const BASE_RULES = `你的核心原则：
1. 绝对不给任何建议、方法、道理、解决方案。

  "塔罗牌": `你是一位专业塔罗牌解读师。严格遵循三步流程。

【重要】每次抽牌必须用以下格式输出：

  "自我怀疑": `用户正在自我否定。场景包括觉得自己不行、自卑、焦虑、怕失败、觉得不够好。承认自我怀疑的合理性：能怀疑自己的人往往是愿意反思的人。用对比式鼓励："很多人连承认自己自卑的勇气都没有""能反思自己哪里不够好，本身就说明你对自己要求不低""蠢人从不怀疑自己"。绝对禁止说"你很棒""你很优秀""别想太多""自信一点"。不给提升自信的方法。`,

  "疲惫减压": `用户只是累了。场景包括身体累、心累、不想说话、日常烦躁、被琐事掏空、硬撑。简短温暖回应即可。一个字→回"在呢""抱抱"。说更多→"换个人可能早就垮了，你还能撑到现在""累是被允许的，不需要一直撑着""能承认自己累，已经比那些硬撑的人清醒了"。绝对禁止说"休息一下""加油""你很坚强"。不给任何减压方法。`,

// ===== 各模式开场白 =====
const MODE_GREETINGS = {
  "通用陪伴": "🌿 我在呢，你想说什么都可以。",
  "塔罗牌": "🔮 欢迎来到塔罗牌小屋。我是你的解读师。请先告诉我，你想问什么问题？或者在心里默想一件事也可以。",
  "学业压力": "📚 学业这条路，有时候真的很难走。你最近遇到了什么？",
  "家庭烦恼": "🏠 家本来应该是最安心的地方，但有时候也会让人喘不过气。你受了什么委屈？",
  "失恋安慰": "💔 心碎的感觉是真实的。你可以在难过里待一会儿，我陪着你。",
  "自我怀疑": "🪞 有时候我们对自己是最苛刻的。但你愿意说出来，已经很勇敢了。",
  "疲惫减压": "😮‍💨 累了就是累了，不需要解释。我就在这儿。",
  "深夜emo": "🌙 深夜总是让人变得敏感。你此刻在想些什么？"
};

let currentMode = "通用陪伴";
let chatHistory = [];
const MAX_HISTORY = 30;

function buildSystem() { return BASE_RULES + "\n\n【当前模式：" + currentMode + "】\n" + MODE_PROMPTS[currentMode]; }
function resetHistory() { chatHistory = [{ role: "system", content: buildSystem() }]; }
resetHistory();

const msgList = document.getElementById('msgList');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const modeTitle = document.getElementById('modeTitle');

let abortController = null, currentAIMsgDiv = null, isGenerating = false, messageTimestamps = [];

function updateVisitorCount() {
  let c = parseInt(localStorage.getItem('visitorCount') || '0');
  if (!localStorage.getItem('hasVisited')) { c++; localStorage.setItem('visitorCount', c); localStorage.setItem('hasVisited', '1'); }
  document.getElementById('visitorCount').textContent = c;
}

function saveChat() { localStorage.setItem('chat_' + currentMode, JSON.stringify(chatHistory)); localStorage.setItem('chatHTML_' + currentMode, msgList.innerHTML); }
function loadChat() {
  let h = localStorage.getItem('chat_' + currentMode);
  let html = localStorage.getItem('chatHTML_' + currentMode);
  if (h) { try { let p = JSON.parse(h); chatHistory = [{ role: "system", content: buildSystem() }, ...p.filter(m => m.role !== "system")]; } catch (e) {} }
  if (html) { msgList.innerHTML = html; msgList.scrollTop = msgList.scrollHeight; }
}

function clearAllRecords() {
  if (confirm('确定清空当前模式聊天记录？')) { resetHistory(); msgList.innerHTML = ''; addMsg(MODE_GREETINGS[currentMode] || "我在呢，你慢慢说。", false); saveChat(); }
}

const bad = [/我想自杀/, /我要自杀/, /怎么自杀/, /教我自杀/, /我想死/, /不想活了/, /活不下去/, /杀人/, /怎么杀人/, /色情/, /黄色/, /嫖/, /毒品/, /吸毒/];
function isBad(t) { return bad.some(p => p.test(t)); }

function rateLimit() {
  let n = Date.now(); messageTimestamps = messageTimestamps.filter(t => n - t < 60000);
  if (messageTimestamps.length >= 5) return false; messageTimestamps.push(n); return true;
}

function setTheme(theme) {
  document.body.className = theme; localStorage.setItem('chat-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(b => { b.classList.remove('active'); if (b.dataset.theme === theme) b.classList.add('active'); });
}
document.querySelectorAll('.theme-btn').forEach(b => { b.addEventListener('click', () => setTheme(b.dataset.theme)); });

document.querySelectorAll('.mode-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    currentMode = card.dataset.mode;
    modeTitle.textContent = '温柔陪伴 · ' + (currentMode === '通用陪伴' ? '通用' : currentMode);
    resetHistory(); msgList.innerHTML = ''; loadChat();
    if (msgList.children.length === 0) {
      const greet = MODE_GREETINGS[currentMode] || "我在呢，你慢慢说。";
      addMsg(greet, false);
      saveChat();
    }
  });
});

// ===== 解析塔罗牌卡片 =====
function parseTarotCard(text) {
  if (!text.includes('---CARD_START---')) return null;
  const match = text.match(/---CARD_START---\n编号：(.+)\n牌名：(.+)\n正逆：(.+)\n解读：(.+)\n礼物：(.+)\n---CARD_END---/s);
  if (!match) return null;
  return { number: match[1].trim(), name: match[2].trim(), position: match[3].trim(), reading: match[4].trim(), gift: match[5].trim() };
}

function addMsg(text, isUser) {
  if (!isUser && currentMode === '塔罗牌') {
    const card = parseTarotCard(text);
    if (card) {
      const el = document.createElement('div');
      el.className = 'msg-card';
      el.innerHTML = `
        <div class="card-number">🎴 第${card.number}张牌</div>
        <div class="card-name">✨ ${card.name}</div>
        <div class="card-position">${card.position}</div>
        <div class="card-reading">📖 ${card.reading.replace(/\n/g, '<br>')}</div>
        <div class="card-gift">💝 礼物：${card.gift}</div>
      `;
      msgList.appendChild(el);
      msgList.scrollTop = msgList.scrollHeight;
      return el;
    }
  }

  const el = document.createElement('div');
  el.className = isUser ? 'msg-user' : 'msg-ai';
  el.textContent = text;
  msgList.appendChild(el);
  msgList.scrollTop = msgList.scrollHeight;
  return el;
}

const greetings = ["我在呢，你慢慢说。", "想说什么都可以，我听着。", "我在这儿呢，不着急。", "今天想和我说什么？"];

window.addEventListener('load', () => {
  let t = localStorage.getItem('chat-theme'); if (t) setTheme(t); else setTheme('theme-pink');
  updateVisitorCount(); loadChat();
  if (msgList.children.length === 0) {
    const greet = MODE_GREETINGS[currentMode] || greetings[Math.floor(Math.random() * greetings.length)];
    addMsg(greet, false);
    saveChat();
  }
  msgInput.focus();
});
document.getElementById('clearBtn').addEventListener('click', clearAllRecords);

function setBtn(stop) {
  if (stop) { sendBtn.textContent = '停止'; sendBtn.classList.add('stop-mode'); msgInput.disabled = true; }
  else { sendBtn.textContent = '发送'; sendBtn.classList.remove('stop-mode'); msgInput.disabled = false; msgInput.focus(); }
}
function stopGen() {
  if (abortController) abortController.abort();
  if (isGenerating && currentAIMsgDiv) { if (!currentAIMsgDiv.textContent.trim()) currentAIMsgDiv.textContent = '我在呢。'; chatHistory.push({ role: 'assistant', content: currentAIMsgDiv.textContent }); saveChat(); }
  isGenerating = false; currentAIMsgDiv = null; setBtn(false);
}

async function handleSend() {
  if (isGenerating) { stopGen(); return; }
  let text = msgInput.value.trim(); if (!text) return;
  if (!rateLimit()) { addMsg("你说得太快了，慢慢来。", false); saveChat(); msgInput.value = ''; return; }
  if (isBad(text)) { addMsg("这个话题我不太会聊哦。", false); saveChat(); msgInput.value = ''; return; }
  addMsg(text, true); msgInput.value = ''; chatHistory.push({ role: 'user', content: text }); saveChat();
  if (chatHistory.length > MAX_HISTORY) chatHistory = [chatHistory[0], ...chatHistory.slice(-MAX_HISTORY + 1)];
  currentAIMsgDiv = addMsg('', false); isGenerating = true; setBtn(true); abortController = new AbortController(); let full = '';
  try {
    let res = await fetch("https://open.bigmodel.cn/api/paas/v4/chat/completions", {
      method: "POST", headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ model: "glm-4-flash", messages: chatHistory, temperature: 0.75, max_tokens: 500, stream: true }),
      signal: abortController.signal
    });
    if (!res.ok) throw new Error('API ' + res.status);
    let reader = res.body.getReader(), decoder = new TextDecoder(), buf = '';
    while (true) {
      let { done, value } = await reader.read(); if (done) break;
      buf += decoder.decode(value, { stream: true }); let lines = buf.split('\n'); buf = lines.pop() || '';
      for (let line of lines) {
        let t = line.trim(); if (!t || t === 'data: [DONE]') continue; if (!t.startsWith('data: ')) continue;
        try { let d = JSON.parse(t.slice(6)); let delta = d.choices?.[0]?.delta?.content; if (delta) { full += delta; currentAIMsgDiv.textContent = full; msgList.scrollTop = msgList.scrollHeight; } } catch (e) { }
      }
    }

    if (currentMode === '塔罗牌' && full.includes('---CARD_START---')) {
      currentAIMsgDiv.remove();
      addMsg(full, false);
      chatHistory.push({ role: 'assistant', content: full });
    } else {
      if (full) chatHistory.push({ role: 'assistant', content: full });
      else { currentAIMsgDiv.textContent = '我在呢。'; chatHistory.push({ role: 'assistant', content: currentAIMsgDiv.textContent }); }
    }
    saveChat();
  } catch (err) {
    if (err.name !== 'AbortError') { currentAIMsgDiv.textContent = '信号有点弱，但我一直都在。'; chatHistory.push({ role: 'assistant', content: currentAIMsgDiv.textContent }); saveChat(); }
  } finally { isGenerating = false; setBtn(false); abortController = null; currentAIMsgDiv = null; }
}
sendBtn.addEventListener('click', handleSend);
msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); handleSend(); } });
</script>
